<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoKe Remote</title>
    <link rel="icon" type="image/webp" href="/img/favicon.webp">
    <link rel="icon" type="image/webp" sizes="32x32" href="/img/favicon-32x32.webp">
    <link rel="icon" type="image/webp" sizes="16x16" href="/img/favicon-16x16.ico">
    <link rel="apple-touch-icon" type="image/png" sizes="180x180" href="/img/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/index.min.css">
</head>
<body class="font-sans antialiased pb-24">

    <header class="flex justify-between items-center sticky top-0 z-50 bg-gray-900 bg-opacity-90 backdrop-blur-md border-b border-gray-800 p-4 shadow-lg">
        <h1 class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-violet-500">
            <img src="https://ik.imagekit.io/denxbluemonday/tr:w-52,f-webp,q-80/goke-player/logo.png" alt="🎤" class="inline"/> GOKE REMOTE
        </h1>
        <button onclick="openSettings()" class="text-2xl p-2 bg-gray-800 rounded-full hover:bg-gray-700 transition shadow-sm border border-gray-700">
            ⚙️
        </button>
    </header>

    <main class="p-4 max-w-md mx-auto">
        
        <div class="mb-5 space-y-3">
            <div class="flex gap-2">
                <button id="tabLocal" onclick="switchMode('local')" class="flex-1 py-2 rounded-lg font-bold bg-pink-600 text-white shadow-md transition">
                    📁 Lokal
                </button>
                <button id="tabYT" onclick="switchMode('youtube')" class="flex-1 py-2 rounded-lg font-bold bg-gray-800 text-gray-400 border border-gray-700 transition">
                    🔴 YouTube
                </button>
            </div>

            <div class="flex gap-2">
                <button onclick="scanLibrary()" id="btnScan" class="flex-1 py-2 bg-violet-600 hover:bg-violet-700 text-white rounded-lg font-bold shadow-md transition text-sm">
                    🔄 Scan Lokal
                </button>
                <button onclick="scanAList()" id="btnScanAList" class="flex-1 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold shadow-md transition text-sm">
                    ☁️ Scan AList
                </button>
                <button onclick="clearQueueBtn()" class="flex-1 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-bold shadow-md transition text-sm">
                    🗑️ Hapus Antrian
                </button>
            </div>

            <div class="relative w-full">
                <input type="text" id="searchInput" placeholder="Cari penyanyi atau judul lagu lokal..." 
                    class="w-full bg-gray-800 text-white border border-gray-700 rounded-xl py-3 px-4 pr-12 outline-none focus:ring-2 focus:ring-pink-500 transition">
                <button onclick="executeSearch()" class="absolute right-2 top-1.5 bg-pink-600 hover:bg-pink-700 rounded-lg p-2 transition">
                    🔍
                </button>
            </div>
        </div>

        <div>
            <h2 class="text-lg font-bold text-gray-400 mb-3 uppercase tracking-wide text-sm">Daftar Lagu</h2>
            <div id="songList" class="space-y-3">
                <p class="text-center text-gray-500 italic">Memuat lagu...</p>
            </div>
            <div id="loadMoreContainer" class="text-center hidden mb-8">
            <button onclick="loadMoreSongs()" class="bg-gray-700 hover:bg-gray-600 text-white py-2 px-6 rounded-full text-sm font-bold shadow-md transition-colors">
                ⏬ Muat Lebih Banyak
            </button>
        </div>
        </div>

        <div class="mt-8 border-t border-gray-800 pt-6">
            <h2 class="text-lg font-bold text-gray-400 mb-3 uppercase tracking-wide text-sm">Antrian Saat Ini</h2>
            <div id="queueList" class="space-y-2">
                </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 w-full bg-gray-900 border-t border-gray-800 p-4 pb-safe flex justify-around items-center z-50 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.5)]">
        <button onclick="sendCommand('PAUSE')" class="text-2xl p-3 bg-gray-800 rounded-full hover:bg-gray-700 transition">⏸️</button>
        <button onclick="sendCommand('RESUME')" class="text-3xl p-4 bg-gradient-to-r from-pink-500 to-violet-600 rounded-full btn-glow hover:scale-105 transition-transform text-white">▶️</button>
        <button onclick="sendCommand('STOP')" class="text-2xl p-3 bg-gray-800 rounded-full hover:bg-gray-700 transition">⏹️</button>
        <button onclick="sendCommand('NEXT')" class="text-2xl p-3 bg-gray-800 rounded-full hover:bg-gray-700 transition">⏭️</button>
    </div>

    <div id="settingsModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black bg-opacity-80 backdrop-blur-sm px-4">
        <div class="bg-gray-900 border border-gray-700 rounded-2xl p-6 w-full max-w-md shadow-2xl transition-all">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-pink-400">⚙️ Pengaturan Player</h2>
                <button onclick="closeSettings()" class="text-gray-400 hover:text-white text-3xl leading-none">&times;</button>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Resolusi Video (YouTube/AList)</label>
                    <select id="configRes" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg p-3 outline-none focus:ring-2 focus:ring-pink-500 focus:border-pink-500 transition">
                        <option value="480">480p (Paling Ringan)</option>
                        <option value="720">720p (Standar STB B860H)</option>
                        <option value="1080">1080p (HD)</option>
                        <option value="best">Best (Kualitas Maksimal)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Prioritas Codec Video</label>
                    <select id="configCodec" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg p-3 outline-none focus:ring-2 focus:ring-pink-500 focus:border-pink-500 transition">
                        <option value="h264">H.264 / AVC (Aman buat TV)</option>
                        <option value="hevc">H.265 / HEVC (Hemat Storage)</option>
                        <option value="vp9">VP9 (Lancar di PC)</option>
                        <option value="best">Best (Otomatis)</option>
                    </select>
                </div>
            </div>

            <div class="pt-4 border-t border-gray-700">
                <h3 class="text-lg font-bold text-violet-400 mb-3">☁️ Pengaturan AList</h3>
                
                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-300 mb-2">URL Server AList</label>
                    <input type="text" id="configAListURL" placeholder="http://192.168.x.x:5244" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg p-3 outline-none focus:ring-2 focus:ring-violet-500 transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Path Folder Karaoke (di AList)</label>
                    <input type="text" id="configAListPath" placeholder="/GoogleDrive/Karaoke" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg p-3 outline-none focus:ring-2 focus:ring-violet-500 transition">
                </div>
            </div>

            <div class="pt-4 border-t border-gray-700 mt-2">
                <h3 class="text-sm font-bold text-red-500 mb-2">⚠️ Zona Bahaya</h3>
                <button onclick="clearSongsBtn()" class="w-full py-2 bg-red-900 hover:bg-red-800 text-red-100 rounded-lg font-bold border border-red-700 transition text-sm">
                    🗑️ Hapus Semua Daftar Lagu (Scan)
                </button>
            </div>

            <div class="mt-8 flex justify-end gap-3">
                <button onclick="closeSettings()" class="px-5 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-white transition font-semibold border border-gray-700">Batal</button>
                <button onclick="saveSettings()" class="px-5 py-2 bg-gradient-to-r from-pink-600 to-violet-600 hover:from-pink-500 hover:to-violet-500 rounded-lg text-white font-bold transition shadow-lg">Simpan</button>
            </div>
        </div>
    </div>

    <script src="/index.min.js"></script>
</body>
</html>
