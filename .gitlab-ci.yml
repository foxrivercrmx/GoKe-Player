stages:
  - build

build_goke:
  stage: build
  image: golang:1.25-alpine 
  script:
    - echo "Mulai merakit GoKe Player (Embed & CGO-Free Edition)..."
    - go mod tidy
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o goke-player main.go
    - echo "Build selesai, binary mandiri siap diangkut!"
  artifacts:
    paths:
      - goke-player # Nah, sekarang beneran cuma bawa satu file ini doang!
    expire_in: 1 week