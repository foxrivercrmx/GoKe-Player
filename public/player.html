<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoKe Player - TV</title>
    <link rel="icon" type="image/webp" href="/img/favicon.webp">
    <link rel="icon" type="image/webp" sizes="32x32" href="/img/favicon-32x32.webp">
    <link rel="icon" type="image/webp" sizes="16x16" href="/img/favicon-16x16.ico">
    <link rel="apple-touch-icon" type="image/png" sizes="180x180" href="/img/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/player.min.css">
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center relative font-sans">

    <div id="start-overlay" class="absolute inset-0 z-50 flex items-center justify-center bg-black bg-opacity-90 cursor-pointer" onclick="initPlayer()">
        <h1 class="text-4xl font-bold neon-text">Klik OK / Enter di Remote STB untuk Mulai</h1>
    </div>

    <div id="idle-screen" class="absolute inset-0 flex flex-col items-center justify-center hidden bg-gray-900 bg-opacity-80 z-10">
        <h1 class="text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-violet-500 mb-4">GOKE PLAYER</h1>
        <p class="text-2xl text-gray-300">Pilih lagu dari HP akang...</p>
        
        <div id="up-next" class="mt-8 p-4 bg-white bg-opacity-10 rounded-xl backdrop-blur-md hidden">
            <p class="text-sm text-pink-400 font-bold uppercase tracking-widest mb-1">Selanjutnya</p>
            <p id="next-title" class="text-xl font-semibold">Memuat...</p>
        </div>
    </div>

    <video id="video-player" class="w-full h-full object-cover hidden"></video>

    <div id="now-playing" class="absolute bottom-10 left-10 p-4 bg-black bg-opacity-60 rounded-xl backdrop-blur-sm hidden transition-opacity duration-500 z-20">
        <p class="text-sm text-green-400 font-bold uppercase tracking-widest mb-1">🎵 Sedang Diputar</p>
        <p id="current-title" class="text-2xl font-bold">Judul Lagu</p>
    </div>

    <script src="/player.min.js"></script>
</body>
</html>
